name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up uv (manages the pinned Python from .python-version)
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Lint (ruff)
        run: uv run ruff check src scripts tests conftest.py alembic

      - name: Format check (black)
        run: uv run black --check src scripts tests conftest.py alembic

      - name: Type check (mypy)
        run: uv run mypy

      - name: Unit tests (golden tests need data/raw, absent in CI → excluded)
        run: uv run pytest -q -m "not golden"
